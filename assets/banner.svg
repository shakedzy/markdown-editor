<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#0a2f5e"/>
    </linearGradient>
    <filter id="banner-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="20" ry="20" fill="url(#banner-bg)"/>

  <!-- Icon tile -->
  <g transform="translate(80, 60)">
    <rect width="200" height="200" rx="38" ry="38" fill="#ffffff" fill-opacity="0.14"/>
    <text
      x="100" y="125"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-weight="800" font-size="92" letter-spacing="-3"
      text-anchor="middle" fill="#ffffff" filter="url(#banner-shadow)">MD</text>
    <text
      x="100" y="172"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-weight="700" font-size="36" letter-spacing="3"
      text-anchor="middle" fill="#ffffff" fill-opacity="0.85">↓</text>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(330, 145)" filter="url(#banner-shadow)">
    <text
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-weight="800" font-size="92" letter-spacing="-2"
      fill="#ffffff">MDitor</text>
    <text
      y="50"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-weight="500" font-size="26" letter-spacing="0"
      fill="#ffffff" fill-opacity="0.88">A cross-platform Markdown editor &amp; viewer</text>
    <text
      y="90"
      font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
      font-weight="500" font-size="18" letter-spacing="0"
      fill="#ffffff" fill-opacity="0.65">macOS · Linux · Windows  ·  GFM + GitHub extensions  ·  KaTeX  ·  Mermaid</text>
  </g>
</svg>
